name: Deploy → 10x-lifeos.com

# Mỗi lần push lên main (hoặc bấm Run thủ công) → tự upload bộ trang
# vào /public_html/fc-fastcapture/ trên hosting qua FTP.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP deploy → public_html/fc-fastcapture/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}     # vd: 10x-lifeos.com  (hoặc ftp.10x-lifeos.com / IP)
          username: ${{ secrets.FTP_USERNAME }}    # user FTP/cPanel
          password: ${{ secrets.FTP_PASSWORD }}    # mật khẩu FTP (Bí mật — GitHub giữ, tôi không thấy)
          protocol: ftps                            # đa số cPanel hỗ trợ FTPS; nếu lỗi đổi thành: ftp
          port: 21
          server-dir: public_html/fc-fastcapture/   # nếu FTP đã vào sẵn public_html → đổi thành: fc-fastcapture/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            deploy.yml
