name: Build Windows (.exe)

# Builds the Windows x64 executable on a real Windows runner (PyInstaller cannot
# cross-compile) and uploads it as a RUN ARTIFACT for testing (download via
# `gh run download`). It does NOT touch any GitHub Release — releases are cut
# MANUALLY after the .exe passes VM testing, so a code push can never clobber a
# published rollback build. To attach to a release, push a version tag (below).

on:
  workflow_dispatch: {}          # run on demand from the Actions tab
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-windows.yml'
    tags:
      - 'v*'                      # a version tag → also attach to that release

permissions:
  contents: write                # needed to upload the release asset

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Smoke import test (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import platform_backend, config, capture, windows, autolaunch, overlay, settings, editor, floatingbar, recorder, notify, theme, main, hotkeys_win, winshot; print('all modules import OK on Windows')"

      - name: Generate FC.ico
        env:
          QT_QPA_PLATFORM: offscreen
        run: python make_icon.py

      - name: Build FC-FastCapture.exe (PyInstaller, one-file)
        run: >
          pyinstaller
          --name FC-FastCapture
          --onefile --windowed --noconfirm --clean
          --icon FC.ico
          --collect-submodules imageio
          --collect-submodules mss
          --collect-all imageio_ffmpeg
          --exclude-module AppKit
          --exclude-module Foundation
          --exclude-module Quartz
          --exclude-module objc
          --exclude-module ApplicationServices
          --exclude-module HIServices
          main.py

      - name: Verify + rename artifact
        shell: pwsh
        run: |
          if (!(Test-Path "dist/FC-FastCapture.exe")) {
            Write-Error "PyInstaller did not produce FC-FastCapture.exe"; exit 1
          }
          Copy-Item "dist/FC-FastCapture.exe" "dist/FC-FastCapture-Windows.exe"
          Get-Item "dist/FC-FastCapture-Windows.exe" |
            Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: FC-FastCapture-Windows
          path: app/dist/FC-FastCapture-Windows.exe

      # Attach to a release ONLY when a version tag (v*) is pushed — the tag name
      # IS the release, so this can never clobber a different version's asset.
      # A plain push to main just leaves the run artifact for testing.
      - name: Attach to the tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/FC-FastCapture-Windows.exe" --clobber
